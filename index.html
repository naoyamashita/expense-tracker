<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker | スマートな出費管理</title>
    <meta name="description" content="シンプルで美しい出費管理ツール">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div class="container">
        <header>
            <div class="header-top">
                <div id="sync-status" class="sync-status hide">
                    <span class="sync-spinner"></span>
                    <span id="sync-text">同期中...</span>
                </div>
                <button id="reload-btn" class="icon-btn small" title="再読み込み">🔄</button>
            </div>
            <h1>Expense Tracker</h1>
        </header>

        <main>
            <section class="period-selector">
                <button id="prev-period" class="nav-btn">&lt;</button>
                <div class="period-info">
                    <p id="period-name">2026年3月度</p>
                    <span id="period-dates">2/11 ~ 3/10</span>
                </div>
                <button id="next-period" class="nav-btn">&gt;</button>
            </section>

            <section class="total-display">
                <div class="total-amount">
                    <span class="total-currency">¥</span>
                    <span id="monthly-total">0</span>
                </div>
            </section>

            <section class="input-section">
                <div class="input-group">
                    <input type="number" id="amount-input" placeholder="金額を入力 (例: 1000)" min="0" inputmode="decimal">
                </div>
                <div class="input-group">
                    <input type="text" id="desc-input" placeholder="内容 (例: ランチ、コンビニ)">
                </div>
                <button id="add-btn">出費を追加</button>
            </section>

            <section class="history-section">
                <h2>最近の履歴</h2>
                <ul class="history-list" id="history-list">
                    <!-- 履歴がここに追加されます -->
                </ul>
            </section>
        </main>

        <footer>
            <button id="settings-btn" class="settings-link-btn">GitHub連携設定 ⚙️</button>
        </footer>
    </div>
    <!-- Settings Modal -->
    <div id="settings-modal" class="modal hide">
        <div class="modal-content">
            <h2>GitHub連携設定</h2>
            <p class="settings-desc">データをGitHub上のCSVとして保存するための設定です。</p>
            <div class="input-group">
                <label>GitHubユーザー名</label>
                <input type="text" id="gh-user" placeholder="naoyamashita">
            </div>
            <div class="input-group">
                <label>リポジトリ名</label>
                <input type="text" id="gh-repo" placeholder="expense-tracker">
            </div>
            <div class="input-group">
                <label>アクセストークン (PAT)</label>
                <input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxx">
            </div>
            <div class="modal-actions">
                <button id="save-settings" class="btn-primary">保存して反映</button>
            </div>

            <hr class="modal-divider">

            <h3>サブスクリプション設定</h3>
            <p class="settings-desc">定期的な出費（月額・年額）を登録します。</p>

            <div id="sub-list" class="sub-list">
                <!-- サブスク一覧がここに追加されます -->
            </div>

            <div class="sub-form">
                <input type="text" id="sub-name" placeholder="名称 (例: Netflix)">
                <div class="sub-form-row">
                    <input type="number" id="sub-amount" placeholder="金額" min="0">
                    <select id="sub-freq">
                        <option value="monthly">毎月</option>
                        <option value="yearly">毎年</option>
                    </select>
                </div>
                <div id="sub-date-group" class="sub-form-row">
                    <input type="number" id="sub-day" placeholder="日 (1-31)" min="1" max="31">
                    <input type="number" id="sub-month" placeholder="月 (年額のみ)" min="1" max="12" class="hide">
                </div>
                <button id="add-sub-btn" class="btn-secondary">サブスクを追加</button>
            </div>

            <div class="modal-actions">
                <button id="close-settings" class="btn-secondary">閉じる</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
